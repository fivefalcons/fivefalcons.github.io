  <g fill="none" stroke-linecap="round" filter="url(#routeGlow)">
    <use href="#routeA" stroke="#f0c55d" stroke-opacity=".18" stroke-width="12"/>
    <use href="#routeB" stroke="#f0c55d" stroke-opacity=".14" stroke-width="10"/>
    <use href="#routeC" stroke="#8ec8ef" stroke-opacity=".12" stroke-width="9"/>
    <use href="#routeA" class="route route-a" stroke="url(#gold)" stroke-width="3.2" stroke-dasharray="12 11"/>
    <use href="#routeB" class="route route-b" stroke="#f0c55d" stroke-width="2.8" stroke-dasharray="9 10"/>
    <use href="#routeC" class="route route-c" stroke="#9ed8ff" stroke-width="2.4" stroke-dasharray="8 11"/>
  </g>

  <g class="cities">
    <g transform="translate(130 306)"><circle r="22" fill="url(#pointGlow)"/><circle r="6" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(138 54)"><circle r="19" fill="url(#pointGlow)"/><circle r="5" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(334 235)"><circle r="18" fill="url(#pointGlow)"/><circle r="5" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(446 367)"><circle r="23" fill="url(#pointGlow)"/><circle r="6" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(570 197)"><circle r="25" fill="url(#pointGlow)"/><circle r="7" fill="#59d59b" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(631 339)"><circle r="19" fill="url(#pointGlow)"/><circle r="5" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(755 189)"><circle r="22" fill="url(#pointGlow)"/><circle r="6" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
    <g transform="translate(717 472)"><circle r="18" fill="url(#pointGlow)"/><circle r="5" fill="#f0c55d" stroke="#fff" stroke-width="2"/></g>
  </g>

  <g filter="url(#softShadow)">
    <g transform="translate(-42 -16)">
      <g id="truck-one">
        <rect x="0" y="6" width="49" height="20" rx="2" fill="url(#trailer)" stroke="#667586" stroke-width="1.2"/>
        <path d="M49 11h13l8 8v7H49Z" fill="url(#cab)" stroke="#8f6419" stroke-width="1.2"/>
        <path d="M56 13h6l5 6h-11Z" fill="#19334b" stroke="#d6e1eb" stroke-width=".8"/>
        <rect x="48" y="22" width="23" height="4" rx="1" fill="#495867"/>
        <rect x="3" y="9" width="42" height="2" fill="#fff" opacity=".45"/>
        <circle cx="12" cy="29" r="5.5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
        <circle cx="42" cy="29" r="5.5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
        <circle cx="60" cy="29" r="5.5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
        <circle cx="68" cy="23" r="1.5" fill="#fff3b4"/>
      </g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto" keyTimes="0;.48;.54;1" keyPoints="0;.5;.5;1" calcMode="spline" keySplines=".4 0 .2 1;0 0 1 1;.4 0 .2 1">
        <mpath href="#routeA"/>
      </animateMotion>
    </g>

    <g transform="translate(-31 -12) scale(.78)">
      <rect x="0" y="5" width="43" height="18" rx="2" fill="url(#trailer)" stroke="#667586" stroke-width="1.2"/>
      <path d="M43 9h13l8 8v6H43Z" fill="#5ab0e8" stroke="#2a6d9b" stroke-width="1.2"/>
      <path d="M50 11h6l5 6H50Z" fill="#17324a" stroke="#d6e1eb" stroke-width=".8"/>
      <circle cx="11" cy="26" r="5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
      <circle cx="37" cy="26" r="5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
      <circle cx="55" cy="26" r="5" fill="#07111d" stroke="#8d99a6" stroke-width="2"/>
      <animateMotion dur="15s" begin="-5s" repeatCount="indefinite" rotate="auto">
        <mpath href="#routeB"/>
      </animateMotion>
    </g>
  </g>

  <style>
    .route-a{animation:dashA 3.2s linear infinite}.route-b{animation:dashB 4s linear infinite}.route-c{animation:dashC 4.8s linear infinite}
    .cities>g{animation:pulse 3s ease-in-out infinite}.cities>g:nth-child(2n){animation-delay:-1.3s}
    @keyframes dashA{to{stroke-dashoffset:-46}}@keyframes dashB{to{stroke-dashoffset:-38}}@keyframes dashC{to{stroke-dashoffset:-38}}
    @keyframes pulse{0%,100%{opacity:.72}50%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.route,.cities>g{animation:none}}
  </style>
</svg>