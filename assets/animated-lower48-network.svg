<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Animated Five Falcons lower 48 route network</title>
  <desc id="desc">An accurate outline of the contiguous United States with representative animated freight routes and semi trucks.</desc>
  <defs>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173f63"/>
      <stop offset="1" stop-color="#0f2c49"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7dfa0"/>
      <stop offset=".45" stop-color="#f0c55d"/>
      <stop offset="1" stop-color="#d99b20"/>
    </linearGradient>
    <linearGradient id="trailer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#cbd5df"/>
      <stop offset="1" stop-color="#9ba9b7"/>
    </linearGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd878"/>
      <stop offset=".55" stop-color="#e7b94f"/>
      <stop offset="1" stop-color="#b97a12"/>
    </linearGradient>
    <radialGradient id="pointGlow">
      <stop offset="0" stop-color="#f0c55d" stop-opacity=".95"/>
      <stop offset="1" stop-color="#f0c55d" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-80%" width="180%" height="260%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <filter id="routeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="routeA" d="M130 306C248 191 449 279 570 197S705 151 755 189"/>
    <path id="routeB" d="M138 54C208 102 263 182 334 235S384 333 446 367 560 309 631 339 690 408 717 472"/>
    <path id="routeC" d="M130 306C262 339 332 329 446 367S586 266 755 189"/>
  </defs>

  <g opacity=".34">
    <ellipse cx="445" cy="466" rx="310" ry="22" fill="#020817"/>
  </g>

